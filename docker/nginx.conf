worker_processes 1;
events { worker_connections 1024; }
http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;
  sendfile      on;
  gzip          on;
  gzip_types    text/plain application/javascript application/json text/css text/html;

  upstream loomscope_api { server api:7842; }

  server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Static UI assets
    location / {
      try_files $uri $uri/ /index.html;
    }

    # Proxy REST API to the api service
    location /api/ {
      proxy_pass http://loomscope_api;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_read_timeout 1h;
      proxy_buffering off;        # required for SSE (/api/events)
      proxy_cache off;
      chunked_transfer_encoding off;
    }
  }
}
