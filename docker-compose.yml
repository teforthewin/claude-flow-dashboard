services:
  flow-dashboard:
    build: .
    container_name: flow-dashboard
    ports:
      - "${FLOW_SERVER_PORT:-7842}:7842"
    volumes:
      - ${HOME:-~}/.claude:/root/.claude
    environment:
      - FLOW_LOG_DIR=/root/.claude/flow-logs
      - FLOW_SERVER_PORT=7842
    restart: unless-stopped
