services:

  # ── Flow-dashboard web server ───────────────────────────────────────────────
  # Reads Claude logs from the host and serves the live dashboard at :7842.
  flow-dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: loomscope-dashboard
    ports:
      - "${FLOW_SERVER_PORT:-7842}:7842"
    volumes:
      # Mount the host Claude directory read-only so the server can tail logs
      - ${CLAUDE_LOG_DIR:-~/.claude}:/root/.claude:ro
    environment:
      - FLOW_LOG_DIR=/root/.claude/flow-logs
      - FLOW_SERVER_PORT=7842
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:7842/')"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ── Electron build (one-shot, exports artefacts to ./dist-linux/) ───────────
  # Run with: docker compose run --rm loomscope-build
  loomscope-build:
    build:
      context: .
      dockerfile: Dockerfile.build
      target: builder
    container_name: loomscope-build
    volumes:
      # Write built artefacts back to the host
      - ./dist-linux:/build/dist
    profiles:
      - build
