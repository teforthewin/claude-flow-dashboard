services:

  # ── LoomScope REST API (Node) ───────────────────────────────────────────────
  # Reads Claude logs from the host (mounted read-only) and exposes a REST + SSE
  # API consumed by both the UI service and the `loomscope` CLI.
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    image: loomscope-api:${LOOMSCOPE_VERSION:-latest}
    container_name: loomscope-api
    ports:
      - "${LOOMSCOPE_API_PORT:-7842}:7842"
    volumes:
      - ${CLAUDE_LOG_DIR:-~/.claude}:/host-claude:ro
      - loomscope-data:/data
    environment:
      LOOMSCOPE_PORT: "7842"
      LOOMSCOPE_DATA_DIR: "/data"
      # Default to the mounted host volume; can be overridden via /api/settings.
      LOOMSCOPE_PROJECTS_DIR: "/host-claude/projects"
      LOOMSCOPE_TEAMS_DIR: "/host-claude/teams"
    restart: unless-stopped

  # ── LoomScope UI (nginx serving the renderer + proxying /api → api) ─────────
  ui:
    build:
      context: .
      dockerfile: Dockerfile.ui
    image: loomscope-ui:${LOOMSCOPE_VERSION:-latest}
    container_name: loomscope-ui
    ports:
      - "${LOOMSCOPE_UI_PORT:-8080}:80"
    depends_on:
      - api
    restart: unless-stopped

  # ── Electron build (one-shot, exports artefacts to ./dist-linux/) ───────────
  # Run with: docker compose --profile build run --rm loomscope-build
  loomscope-build:
    build:
      context: .
      dockerfile: Dockerfile.build
      target: builder
    container_name: loomscope-build
    volumes:
      - ./dist-linux:/build/dist
    profiles:
      - build

volumes:
  loomscope-data:
